<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #e0f7fa;
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 2.5em;
      margin: 0;
    }

    header p {
      opacity: 0.8;
    }

    section {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    h2 {
      border-left: 5px solid #4dd0e1;
      padding-left: 10px;
      color: #80deea;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 5px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <h1>あなたの名前</h1>
    <p>静かに燃える、青の思考。</p>
  </header>

  <section>
    <h2>About Me</h2>
    <p>
      高校○年生。読書と〇〇が好き。<br>
      言葉や思考を通して、自分の世界を広げることに興味があります。
    </p>
  </section>

  <section>
    <h2>Interests</h2>
    <ul>
      <li>読書（思考が深まるから）</li>
      <li>音楽（感情を言語化できないときの逃げ場）</li>
      <li>〇〇</li>
    </ul>
  </section>

  <section>
    <h2>Experience</h2>
    <p>
      部活動や日々の学びの中で、考えて行動することを大切にしています。<br>
      小さな経験でも、自分の中で意味を持たせるようにしています。
    </p>
  </section>

  <section>
    <h2>Vision</h2>
    <p>
      まだ明確な形はないけれど、<br>
      「自分の思考で世界を解釈できる人間」になりたいと考えています。
    </p>
  </section>

  <footer>
    © 2026 My Page
  </footer>

</body>
</html>
